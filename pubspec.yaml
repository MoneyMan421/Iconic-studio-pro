name: iconic_studio_pro
description: Premium icon editor with diamond refraction shaders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_shaders: ^0.1.2
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  shaders:
    - shaders/diamond_master.frag
