name: iconic_studio_pro
description: Premium icon editor with diamond refraction shaders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Core editor
  flutter_shaders: ^0.1.2
  file_picker: ^6.1.1
  path_provider: ^2.1.3
  crypto: ^3.0.3
  flutter_svg: ^2.0.10+1
  web: ^1.0.0
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  # Shared prefs (keep for local editor state)
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  shaders:
    - shaders/diamond_master.frag
