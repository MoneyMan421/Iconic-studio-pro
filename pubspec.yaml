name: iconic_studio_pro
description: Premium icon editor with diamond refraction shaders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_shaders: ^0.1.2
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  shaders:
    - shaders/diamond_master.frag
