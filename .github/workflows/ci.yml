name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate asset directory
        run: test -d assets/icons

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal infos)
        run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run widget tests with coverage
        run: flutter test --coverage

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            command: flutter build apk --debug
          - target: ios
            os: macos-latest
            command: flutter build ios --debug --no-codesign
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Android and iOS platform folders exist for CI builds
        run: flutter create --platforms=android,ios --project-name iconic_studio_pro .

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug app
        run: ${{ matrix.command }}
