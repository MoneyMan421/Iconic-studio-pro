name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']
        # Add 'java' for Android, 'swift' for iOS when analyzing native code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check for dependency vulnerabilities
        run: |
          # List all dependencies
          flutter pub deps --json > dependencies.json
          
          # Check for known vulnerabilities (using pub.dev API)
          echo "Checking dependencies for known vulnerabilities..."
          flutter pub outdated --json > outdated.json || true
          
          # Display security advisories if available
          if command -v dart &> /dev/null; then
            echo "Running pub audit..."
            flutter pub audit || echo "Note: Some dependencies may have security advisories"
          fi

      - name: Upload dependency report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dependency-reports
          path: |
            dependencies.json
            outdated.json
          retention-days: 30

  license-scan:
    name: License Compliance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check licenses
        run: |
          echo "## License Report" > license_report.md
          echo "" >> license_report.md
          flutter pub deps --no-dev | grep -E "^[a-z]" | while read -r pkg version; do
            echo "- $pkg $version" >> license_report.md
          done

      - name: Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: license_report.md
          retention-days: 30

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  summary:
    name: Security Summary
    needs: [codeql, dependency-scan, license-scan, secret-scan]
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: Security Scan Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.codeql.result }}" == "failure" ] || \
             [ "${{ needs.dependency-scan.result }}" == "failure" ] || \
             [ "${{ needs.license-scan.result }}" == "failure" ] || \
             [ "${{ needs.secret-scan.result }}" == "failure" ]; then
            echo "⚠️ **One or more security scans failed. Please review the results.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All security scans passed successfully.**" >> $GITHUB_STEP_SUMMARY
          fi
