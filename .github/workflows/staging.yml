name: Staging Deployment

on:
  push:
    branches:
      - develop
      - staging
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Ensure Android platform folder exists
        run: flutter create --platforms=android --project-name iconic_studio_pro .

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "storeFile=keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties

      - name: Build Android App Bundle (Staging)
        run: flutter build appbundle --release --build-name=1.0.0-staging --build-number=${{ github.run_number }}

      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v3
        with:
          name: android-staging-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Deploy to Google Play Internal Testing
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.moneyman421.iconic_studio_pro
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  build-ios:
    name: Build iOS (Staging)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Ensure iOS platform folder exists
        run: flutter create --platforms=ios --project-name iconic_studio_pro .

      - name: Install dependencies
        run: flutter pub get

      - name: Install Apple certificates
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
        run: |
          # Create temporary keychain
          security create-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Import certificate
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/staging.mobileprovision

      - name: Build iOS App (Staging)
        run: |
          flutter build ios --release --build-name=1.0.0-staging --build-number=${{ github.run_number }} --no-codesign

      - name: Build IPA
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -r app-staging.ipa Payload

      - name: Upload iOS IPA
        if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v3
        with:
          name: ios-staging-ipa
          path: build/ios/iphoneos/app-staging.ipa
          retention-days: 30

      - name: Deploy to TestFlight
        if: ${{ secrets.APP_STORE_CONNECT_API_KEY != '' }}
        run: |
          # Install fastlane if needed
          gem install fastlane
          # Upload to TestFlight using App Store Connect API
          xcrun altool --upload-app -f build/ios/iphoneos/app-staging.ipa \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            --type ios

  build-web:
    name: Build Web (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (Staging)
        run: flutter build web --release --dart-define=ENV=staging

      - name: Upload web build
        uses: actions/upload-artifact@v3
        with:
          name: web-staging-build
          path: build/web/
          retention-days: 30

      - name: Deploy to Firebase Hosting (Staging)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: staging
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy to GitHub Pages (Staging)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages-staging
          destination_dir: staging

  notify:
    name: Notify Deployment
    needs: [build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Android: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- iOS: ${{ needs.build-ios.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web: ${{ needs.build-web.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
